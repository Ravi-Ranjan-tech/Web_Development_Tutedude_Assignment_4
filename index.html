<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Validation App</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <div class="form-card">

      <h2>Create Account</h2>
      <p class="subtitle">Please fill in all the details below</p>

     
      <div id="successMsg" class="success-box" style="display: none;"></div>

     
      <div id="errorMsg" class="error-box" style="display: none;"></div>

      <form id="registrationForm" novalidate>

      
        <div class="form-group">
          <label for="fullName">Full Name <span class="required">*</span></label>
          <input type="text" id="fullName" placeholder="Enter your full name">
          <small class="field-error" id="fullNameError"></small>
        </div>

       
        <div class="form-group">
          <label for="email">Email Address <span class="required">*</span></label>
          <input type="text" id="email" placeholder="user@example.com">
          <small class="field-error" id="emailError"></small>
        </div>

        
        <div class="form-group">
          <label for="phone">Phone Number <span class="required">*</span></label>
          <input type="text" id="phone" placeholder="10-digit number" maxlength="10">
          <small class="field-error" id="phoneError"></small>
        </div>

       
        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <div class="input-with-btn">
            <input type="password" id="password" placeholder="Create a strong password">
            <button type="button" id="togglePassword" class="show-hide-btn">Show</button>
          </div>
          <small class="field-error" id="passwordError"></small>
         
          <ul class="strength-rules">
            <li id="ruleLength">Min 8 chars</li>
            <li id="ruleUpper">Uppercase</li>
            <li id="ruleLower">Lowercase</li>
            <li id="ruleNumber">Number</li>
          </ul>
        </div>

      
        <div class="form-group">
          <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
          <div class="input-with-btn">
            <input type="password" id="confirmPassword" placeholder="Re-enter your password">
            <button type="button" id="toggleConfirm" class="show-hide-btn">Show</button>
          </div>
          <small class="field-error" id="confirmPasswordError"></small>
        </div>

        <button type="submit" id="submitBtn">Register Now</button>

      </form>
    </div>
  </div>

  <!-- jQuery loaded before script.js -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
